name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: api-gateway
            image: ditto/api-gateway
          - module: user_service
            image: ditto/user-service
          - module: feed_service
            image: ditto/feed-service
          - module: match_service
            image: ditto/match-service
          - module: chat_service
            image: ditto/chat-service
          - module: notification_service
            image: ditto/notification-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew :${{ matrix.module }}:bootJar -x test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE: ${{ matrix.image }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$IMAGE:$TAG \
            -t $REGISTRY/$IMAGE:latest \
            ./${{ matrix.module }}
          docker push $REGISTRY/$IMAGE:$TAG
          docker push $REGISTRY/$IMAGE:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ditto
            echo "${{ secrets.ENV_PROD }}" > .env.prod
            docker compose --env-file .env.prod pull
            docker compose --env-file .env.prod --profile app up -d --remove-orphans
            docker image prune -f