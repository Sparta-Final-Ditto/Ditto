name: CI (main)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    outputs:
      has_violations: ${{ steps.check_violations.outputs.has_violations }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain --continue

      - name: Check for violations
        id: check_violations
        if: always()
        run: |
          if find . -path '*/build/reports/checkstyle/main.xml' -exec grep -l '<error ' {} \; | grep -q .; then
            echo "has_violations=true" >> $GITHUB_OUTPUT
          else
            echo "has_violations=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Checkstyle Reports
        if: always() && steps.check_violations.outputs.has_violations == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'
          retention-days: 3

  test:
    name: Unit Test & Coverage
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changes.outputs.skip }}
      all_modules: ${{ steps.changes.outputs.all_modules }}
      service_results: ${{ steps.test_run.outputs.service_results }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          echo "=== Changed files ==="
          echo "$CHANGED"

          # settings.gradle에서 서비스 목록 동적 추출 (common 제외)
          ALL_SERVICES=$(grep "^include " settings.gradle | sed "s/include '//;s/'//" | grep -v "^common$" | tr '\n' ' ' | xargs)
          echo "=== All services: [$ALL_SERVICES] ==="

          if echo "$CHANGED" | grep -qE "^(settings\.gradle|gradle/|common/)"; then
            MODULES="$ALL_SERVICES"
          else
            MODULES=""
            for module in $ALL_SERVICES; do
              if echo "$CHANGED" | grep -qE "^${module}/src/"; then
                MODULES="$MODULES $module"
              fi
            done
            MODULES=$(echo "$MODULES" | xargs)
          fi

          echo "=== Modules to test: [$MODULES] ==="

          echo "all_modules=$ALL_SERVICES" >> $GITHUB_OUTPUT
          if [ -z "$MODULES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "modules=" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "modules=$MODULES" >> $GITHUB_OUTPUT
          fi

      - name: No service changes — skip
        if: steps.changes.outputs.skip == 'true'
        run: echo "변경된 서비스 없음 — 유닛 테스트 스킵"

      - name: Run Tests & Coverage Check (≥70%)
        id: test_run
        if: steps.changes.outputs.skip != 'true'
        run: |
          MODULES="${{ steps.changes.outputs.modules }}"
          RESULTS=""
          OVERALL_EXIT=0

          for m in $MODULES; do
            if ./gradlew :${m}:test :${m}:jacocoTestCoverageVerification; then
              STATUS="success"
            else
              STATUS="failure"
              OVERALL_EXIT=1
            fi

            if [ -z "$RESULTS" ]; then
              RESULTS="${m}=${STATUS}"
            else
              RESULTS="${RESULTS}|${m}=${STATUS}"
            fi
          done

          echo "service_results=$RESULTS" >> $GITHUB_OUTPUT
          exit $OVERALL_EXIT

      - name: Upload JaCoCo HTML Reports
        if: always() && steps.changes.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-${{ github.run_number }}
          path: '**/build/reports/jacoco/test/html/'
          retention-days: 7

      - name: Upload Test Results
        if: always() && steps.changes.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/test-results/test/'
          retention-days: 7

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    # TODO: Testcontainers 기반 통합 테스트 구현 후 needs: [test] 의존 추가 가능
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ditto_test
          POSTGRES_USER: ditto
          POSTGRES_PASSWORD: ditto
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Integration Tests
        # TODO: integrationTest 태스크 및 테스트 클래스 작성 후 아래 커맨드로 교체
        # run: ./gradlew integrationTest --continue
        run: echo "Integration tests not yet implemented — skipping"

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ github.run_number }}
          path: '**/build/test-results/integrationTest/'
          retention-days: 7

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [checkstyle, test, integration-test]
    if: always()
    steps:
      - name: Send Result to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CS_HAS_VIOLATIONS: ${{ needs.checkstyle.outputs.has_violations }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_SKIP: ${{ needs.test.outputs.skip }}
          ALL_MODULES: ${{ needs.test.outputs.all_modules }}
          SERVICE_RESULTS: ${{ needs.test.outputs.service_results }}
          INTEGRATION_RESULT: ${{ needs.integration-test.result }}
          BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          ACTOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$TEST_SKIP" == "true" ]]; then
            COLOR=9807270
            STATUS="⏭️ 스킵"
          elif [[ "$TEST_RESULT" == "success" && "$INTEGRATION_RESULT" == "success" ]]; then
            COLOR=3066993
            STATUS="✅ 성공"
          else
            COLOR=15158332
            STATUS="❌ 실패"
          fi

          if [ "$CS_HAS_VIOLATIONS" = "true" ]; then
            CS_ICON="⚠️"
            CS_TEXT="경고 (위반 있음)"
          else
            CS_ICON="✅"
            CS_TEXT="통과"
          fi

          INT_ICON=$([ "$INTEGRATION_RESULT" = "success" ] && echo "✅" || echo "❌")

          # 모듈명 → 표시용 레이블 (snake_case·kebab-case → Title Case)
          service_label() {
            echo "$1" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1'
          }

          # 유닛 테스트 필드 구성 — 전체 서비스 항상 표시, 감지 안된건 스킵
          TEST_FIELDS=""
          for module in $ALL_MODULES; do
            label=$(service_label "$module")
            svc_status=$(echo "$SERVICE_RESULTS" | tr '|' '\n' | grep "^${module}=" | cut -d'=' -f2)
            if [ -z "$svc_status" ]; then
              icon="⏭️"
              result_text="스킵"
            elif [ "$svc_status" = "success" ]; then
              icon="✅"
              result_text="성공 (≥70%)"
            else
              icon="❌"
              result_text="실패"
            fi
            field="{\"name\": \"${label}\", \"value\": \"${icon} ${result_text}\", \"inline\": true}"
            if [ -z "$TEST_FIELDS" ]; then
              TEST_FIELDS="$field"
            else
              TEST_FIELDS="${TEST_FIELDS},${field}"
            fi
          done

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat << EOF
          {
            "embeds": [{
              "title": "CI ${STATUS} — ${BRANCH}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name": "브랜치", "value": "\`${BRANCH}\`", "inline": true},
                {"name": "작성자", "value": "\`${ACTOR}\`", "inline": true},
                {"name": "Checkstyle", "value": "${CS_ICON} ${CS_TEXT}", "inline": false},
                ${TEST_FIELDS},
                {"name": "통합 테스트", "value": "${INT_ICON} ${INTEGRATION_RESULT}", "inline": false}
              ],
              "footer": {"text": "GitHub Actions CI · main"}
            }]
          }
          EOF
          )"