name: CI (develop)

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    outputs:
      has_violations: ${{ steps.check_violations.outputs.has_violations }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain --continue

      - name: Check for violations
        id: check_violations
        if: always()
        run: |
          if find . -path '*/build/reports/checkstyle/main.xml' -exec grep -l '<error ' {} \; | grep -q .; then
            echo "has_violations=true" >> $GITHUB_OUTPUT
          else
            echo "has_violations=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Checkstyle Reports
        if: always() && steps.check_violations.outputs.has_violations == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'
          retention-days: 3

  test:
    name: Unit Test & Coverage
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changes.outputs.skip }}
      service_results: ${{ steps.test_run.outputs.service_results }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          echo "=== Changed files ==="
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "^(settings\.gradle|gradle/|common/)"; then
            MODULES="api-gateway user_service feed_service match_service chat_service notification_service"
          else
            MODULES=""
            for module in api-gateway user_service feed_service match_service chat_service notification_service; do
              if echo "$CHANGED" | grep -qE "^${module}/src/"; then
                MODULES="$MODULES $module"
              fi
            done
            MODULES=$(echo "$MODULES" | xargs)
          fi

          echo "=== Modules to test: [$MODULES] ==="

          if [ -z "$MODULES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "modules=" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "modules=$MODULES" >> $GITHUB_OUTPUT
          fi

      - name: No service changes — skip
        if: steps.changes.outputs.skip == 'true'
        run: echo "변경된 서비스 없음 — 유닛 테스트 스킵"

      - name: Run Tests & Coverage Check (≥70%)
        id: test_run
        if: steps.changes.outputs.skip != 'true'
        run: |
          MODULES="${{ steps.changes.outputs.modules }}"
          RESULTS=""
          OVERALL_EXIT=0

          for m in $MODULES; do
            if ./gradlew :${m}:test :${m}:jacocoTestCoverageVerification; then
              STATUS="success"
            else
              STATUS="failure"
              OVERALL_EXIT=1
            fi

            if [ -z "$RESULTS" ]; then
              RESULTS="${m}=${STATUS}"
            else
              RESULTS="${RESULTS}|${m}=${STATUS}"
            fi
          done

          echo "service_results=$RESULTS" >> $GITHUB_OUTPUT
          exit $OVERALL_EXIT

      - name: Upload JaCoCo HTML Reports
        if: always() && steps.changes.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-${{ github.run_number }}
          path: '**/build/reports/jacoco/test/html/'
          retention-days: 7

      - name: Upload Test Results
        if: always() && steps.changes.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/test-results/test/'
          retention-days: 7

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [checkstyle, test]
    if: always()
    steps:
      - name: Send Result to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECKSTYLE_RESULT: ${{ needs.checkstyle.result }}
          CS_HAS_VIOLATIONS: ${{ needs.checkstyle.outputs.has_violations }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_SKIP: ${{ needs.test.outputs.skip }}
          SERVICE_RESULTS: ${{ needs.test.outputs.service_results }}
          BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          ACTOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$TEST_RESULT" == "success" ]]; then
            COLOR=3066993
            STATUS="✅ 성공"
          else
            COLOR=15158332
            STATUS="❌ 실패"
          fi

          if [ "$CS_HAS_VIOLATIONS" = "true" ]; then
            CS_ICON="⚠️"
            CS_TEXT="경고 (위반 있음)"
          else
            CS_ICON="✅"
            CS_TEXT="통과"
          fi

          service_label() {
            case "$1" in
              api-gateway)          echo "API Gateway" ;;
              user_service)         echo "User Service" ;;
              feed_service)         echo "Feed Service" ;;
              match_service)        echo "Match Service" ;;
              chat_service)         echo "Chat Service" ;;
              notification_service) echo "Notification" ;;
              *)                    echo "$1" ;;
            esac
          }

          # 유닛 테스트 필드 구성
          if [ "$TEST_SKIP" = "true" ]; then
            TEST_FIELDS="{\"name\": \"유닛 테스트 & 커버리지\", \"value\": \"⏭️ 스킵 (변경 없음)\", \"inline\": false}"
          elif [ -z "$SERVICE_RESULTS" ]; then
            TEST_ICON=$([ "$TEST_RESULT" = "success" ] && echo "✅" || echo "❌")
            TEST_FIELDS="{\"name\": \"유닛 테스트 & 커버리지\", \"value\": \"${TEST_ICON} ${TEST_RESULT}\", \"inline\": false}"
          else
            TEST_FIELDS=""
            IFS='|' read -ra PAIRS <<< "$SERVICE_RESULTS"
            for pair in "${PAIRS[@]}"; do
              [ -z "$pair" ] && continue
              module="${pair%%=*}"
              status="${pair##*=}"
              label=$(service_label "$module")
              icon=$([ "$status" = "success" ] && echo "✅" || echo "❌")
              result_text=$([ "$status" = "success" ] && echo "성공 (≥70%)" || echo "실패")
              field="{\"name\": \"${label}\", \"value\": \"${icon} ${result_text}\", \"inline\": true}"
              if [ -z "$TEST_FIELDS" ]; then
                TEST_FIELDS="$field"
              else
                TEST_FIELDS="${TEST_FIELDS},${field}"
              fi
            done
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat << EOF
          {
            "embeds": [{
              "title": "CI ${STATUS} — ${BRANCH}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name": "브랜치", "value": "\`${BRANCH}\`", "inline": true},
                {"name": "작성자", "value": "\`${ACTOR}\`", "inline": true},
                {"name": "Checkstyle", "value": "${CS_ICON} ${CS_TEXT}", "inline": false},
                ${TEST_FIELDS}
              ],
              "footer": {"text": "GitHub Actions CI · develop"}
            }]
          }
          EOF
          )"