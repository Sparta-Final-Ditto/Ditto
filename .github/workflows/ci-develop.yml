name: CI (develop)

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changes.outputs.skip }}
      modules: ${{ steps.changes.outputs.modules }}
      all_modules: ${{ steps.changes.outputs.all_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          echo "=== Changed files ==="
          echo "$CHANGED"

          ALL_SERVICES=$(grep "^include " settings.gradle | sed "s/include '//;s/'//" | grep -v "^common$" | tr '\n' ' ' | xargs)
          echo "=== All services: [$ALL_SERVICES] ==="

          if echo "$CHANGED" | grep -qE "^(settings\.gradle|gradle/|common/)"; then
            MODULES="$ALL_SERVICES"
          else
            MODULES=""
            for module in $ALL_SERVICES; do
              if echo "$CHANGED" | grep -qE "^${module}/src/"; then
                MODULES="$MODULES $module"
              fi
            done
            MODULES=$(echo "$MODULES" | xargs)
          fi

          echo "=== Modules to test: [$MODULES] ==="

          echo "all_modules=$ALL_SERVICES" >> $GITHUB_OUTPUT
          if [ -z "$MODULES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "modules=" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "modules=$MODULES" >> $GITHUB_OUTPUT
          fi

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.skip != 'true'
    outputs:
      checkstyle_results: ${{ steps.run_checkstyle.outputs.checkstyle_results }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Checkstyle per service
        id: run_checkstyle
        run: |
          MODULES="${{ needs.detect.outputs.modules }}"
          RESULTS=""

          for m in $MODULES; do
            ./gradlew :${m}:checkstyleMain

            if find "${m}/build/reports/checkstyle" -name "main.xml" -exec grep -l '<error ' {} \; 2>/dev/null | grep -q .; then
              STATUS="failure"
            else
              STATUS="success"
            fi

            if [ -z "$RESULTS" ]; then
              RESULTS="${m}=${STATUS}"
            else
              RESULTS="${RESULTS}|${m}=${STATUS}"
            fi
          done

          echo "checkstyle_results=$RESULTS" >> $GITHUB_OUTPUT

      - name: Upload Checkstyle Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'
          retention-days: 3

  test:
    name: Unit Test & Coverage
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.skip != 'true'
    outputs:
      service_results: ${{ steps.test_run.outputs.service_results }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Tests & Coverage Check (≥70%)
        id: test_run
        run: |
          MODULES="${{ needs.detect.outputs.modules }}"
          RESULTS=""
          OVERALL_EXIT=0

          for m in $MODULES; do
            if ./gradlew :${m}:test :${m}:jacocoTestCoverageVerification; then
              STATUS="success"
            else
              STATUS="failure"
              OVERALL_EXIT=1
            fi

            if [ -z "$RESULTS" ]; then
              RESULTS="${m}=${STATUS}"
            else
              RESULTS="${RESULTS}|${m}=${STATUS}"
            fi
          done

          echo "service_results=$RESULTS" >> $GITHUB_OUTPUT
          exit $OVERALL_EXIT

      - name: Upload JaCoCo HTML Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-${{ github.run_number }}
          path: '**/build/reports/jacoco/test/html/'
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/test-results/test/'
          retention-days: 7

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [detect, checkstyle, test]
    if: always()
    steps:
      - name: Send Result to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_SKIP: ${{ needs.detect.outputs.skip }}
          ALL_MODULES: ${{ needs.detect.outputs.all_modules }}
          SERVICE_RESULTS: ${{ needs.test.outputs.service_results }}
          CHECKSTYLE_RESULTS: ${{ needs.checkstyle.outputs.checkstyle_results }}
          BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          ACTOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$TEST_SKIP" == "true" ]]; then
            COLOR=9807270
            STATUS="⏭️ 스킵"
          elif [[ "$TEST_RESULT" == "success" ]]; then
            COLOR=3066993
            STATUS="✅ 성공"
          else
            COLOR=15158332
            STATUS="❌ 실패"
          fi

          service_label() {
            echo "$1" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1'
          }

          SERVICE_FIELDS=""

          for module in $ALL_MODULES; do
            label=$(service_label "$module")
            test_status=$(echo "$SERVICE_RESULTS" | tr '|' '\n' | grep "^${module}=" | cut -d'=' -f2)
            cs_status=$(echo "$CHECKSTYLE_RESULTS" | tr '|' '\n' | grep "^${module}=" | cut -d'=' -f2)

            if [ -z "$test_status" ] && [ -z "$cs_status" ]; then
              value="⏭️ 스킵"
            else
              test_icon=$([ "$test_status" = "success" ] && echo "✅" || echo "❌")
              test_text=$([ "$test_status" = "success" ] && echo "성공 (≥70%)" || echo "실패")
              cs_icon=$([ "$cs_status" = "success" ] && echo "✅" || echo "⚠️")
              cs_text=$([ "$cs_status" = "success" ] && echo "통과" || echo "경고 (위반 있음)")
              value="Unit Test: ${test_icon} ${test_text}\nCheckstyle: ${cs_icon} ${cs_text}"
            fi

            field="{\"name\": \"${label}\", \"value\": \"${value}\", \"inline\": false}"
            if [ -z "$SERVICE_FIELDS" ]; then
              SERVICE_FIELDS="$field"
            else
              SERVICE_FIELDS="${SERVICE_FIELDS},${field}"
            fi
          done

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat << EOF
          {
            "embeds": [{
              "title": "CI ${STATUS} — ${BRANCH}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name": "브랜치", "value": "\`${BRANCH}\`", "inline": true},
                {"name": "작성자", "value": "\`${ACTOR}\`", "inline": true},
                ${SERVICE_FIELDS}
              ],
              "footer": {"text": "GitHub Actions CI · develop"}
            }]
          }
          EOF
          )"