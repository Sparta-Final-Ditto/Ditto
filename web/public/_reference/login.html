<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Ditto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1f6f4a;--green-b:#35c281;--green-10:rgba(31,111,74,.1);--green-20:rgba(31,111,74,.2);
  --bg:#fbfbf7;--bg2:#f4f6f0;
  --border:rgba(18,20,15,.1);--border2:rgba(18,20,15,.16);
  --ink:#12140f;--im:rgba(18,20,15,.55);--id:rgba(18,20,15,.32);
  --fd:'Fraunces',serif;--fk:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--fk);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::selection{background:var(--green);color:#fff}

.wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}

/* ── LEFT: brand panel ── */
.brand-side{background:var(--ink);color:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:48px;position:relative;overflow:hidden}
.brand-mark{display:flex;align-items:center;gap:9px;font-family:var(--fd);font-weight:700;font-size:20px}
.brand-mark svg{width:26px;height:26px}
.brand-copy{max-width:380px}
.brand-copy h2{font-family:var(--fd);font-weight:600;font-size:clamp(24px,2.6vw,32px);line-height:1.3;letter-spacing:-.015em}
.brand-copy h2 em{font-style:italic;color:var(--green-b)}
.brand-copy p{font-size:13.5px;line-height:1.7;color:rgba(255,255,255,.55);margin-top:14px}
.brand-foot{font-size:11px;color:rgba(255,255,255,.3)}
#brand-canvas{position:absolute;inset:0;width:100%!important;height:100%!important;opacity:.5;pointer-events:none}

/* ── RIGHT: form ── */
.form-side{display:flex;align-items:center;justify-content:center;padding:40px}
.form-box{width:100%;max-width:360px;display:flex;flex-direction:column;gap:28px}
.form-head h1{font-family:var(--fd);font-weight:700;font-size:28px;letter-spacing:-.02em}
.form-head p{font-size:13.5px;color:var(--im);margin-top:6px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:600;color:var(--im)}
.field input{
  font-family:var(--fk);font-size:14px;padding:12px 14px;border:1px solid var(--border2);
  border-radius:10px;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;color:var(--ink);
}
.field input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-10)}
.field input::placeholder{color:var(--id)}
.form-opts{display:flex;justify-content:space-between;align-items:center;font-size:12.5px}
.chk{display:flex;align-items:center;gap:7px;color:var(--im)}
.chk input{accent-color:var(--green)}
.form-opts a{color:var(--green);font-weight:600}
.submit{
  font-family:var(--fk);font-size:14.5px;font-weight:700;color:#fff;background:var(--ink);
  padding:14px;border:none;border-radius:100px;cursor:pointer;transition:background .2s,transform .2s;
}
.submit:hover{background:var(--green);transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--id);text-transform:uppercase;letter-spacing:.08em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.signup-hint{text-align:center;font-size:13px;color:var(--im)}
.signup-hint a{color:var(--green);font-weight:700}
.err{display:none;font-size:12.5px;color:#b3402b;background:rgba(179,64,43,.08);border:1px solid rgba(179,64,43,.2);padding:10px 14px;border-radius:10px}
.err.show{display:block}

@media(max-width:820px){
  .wrap{grid-template-columns:1fr}
  .brand-side{display:none}
}
</style>
</head>
<body>

<div class="wrap">
  <!-- LEFT BRAND -->
  <div class="brand-side">
    <canvas id="brand-canvas"></canvas>
    <div class="brand-mark" style="position:relative;z-index:1">
      <svg viewBox="0 0 32 32"><circle cx="12" cy="16" r="10" fill="#fff" fill-opacity=".95"/><circle cx="20" cy="16" r="10" fill="#0d3d29" fill-opacity=".55"/></svg>
      Ditto
    </div>
    <div class="brand-copy" style="position:relative;z-index:1">
      <h2>당신과 <em>같은 파장</em>을 가진<br>사람을 다시 만나보세요</h2>
      <p>취향과 관심사의 결을 읽어 매일 한 명, 진짜 통할 사람을 연결합니다.</p>
    </div>
    <div class="brand-foot" style="position:relative;z-index:1">© 2026 Ditto</div>
  </div>

  <!-- RIGHT FORM -->
  <div class="form-side">
    <div class="form-box">
      <div class="form-head">
        <h1>다시 만나서 반가워요</h1>
        <p>계정 정보를 입력하고 오늘의 매칭을 확인하세요.</p>
      </div>

      <div class="err" id="loginErr">이메일 또는 비밀번호가 올바르지 않아요.</div>

      <form id="loginForm" style="display:flex;flex-direction:column;gap:16px">
        <div class="field">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호 입력" required>
        </div>
        <div class="form-opts">
          <label class="chk"><input type="checkbox">로그인 상태 유지</label>
          <a href="#">비밀번호 찾기</a>
        </div>
        <button class="submit" type="submit">로그인</button>
      </form>

      <div class="divider">또는</div>
      <div class="signup-hint">계정이 없으신가요? <a href="#">회원가입</a></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 왼쪽 패널 배경 - 랜딩과 동일한 파티클, 어두운 배경 톤으로만 축소 적용
const canvas = document.getElementById('brand-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
function fit(){ renderer.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight); }
fit();
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, canvas.parentElement.clientWidth/canvas.parentElement.clientHeight, 0.1, 1000);
camera.position.z = 8;
const C=1800,pGeo=new THREE.BufferGeometry(),pPos=new Float32Array(C*3),pSz=new Float32Array(C);
for(let i=0;i<C;i++){
  const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=1+Math.random()*.4;
  pPos[i*3]=r*Math.sin(p)*Math.cos(t);pPos[i*3+1]=r*Math.sin(p)*Math.sin(t);pPos[i*3+2]=r*Math.cos(p);
  pSz[i]=Math.random()*4+1.5;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('size',new THREE.BufferAttribute(pSz,1));
const mat=new THREE.PointsMaterial({color:0x35c281,size:.045,transparent:true,opacity:.55,sizeAttenuation:true});
const pts=new THREE.Points(pGeo,mat);scene.add(pts);
const clk=new THREE.Clock();
(function loop(){
  requestAnimationFrame(loop);
  const t=clk.getElapsedTime();
  pts.rotation.y=t*.06;pts.rotation.x=t*.03;
  renderer.render(scene,camera);
})();
window.addEventListener('resize',()=>{
  fit();
  camera.aspect=canvas.parentElement.clientWidth/canvas.parentElement.clientHeight;
  camera.updateProjectionMatrix();
});

// 데모용 로그인 처리 (실제 API 연동 전 목업)
document.getElementById('loginForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  window.location.href = 'app.html';
});
</script>
</body>
</html>
