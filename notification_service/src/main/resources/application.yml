server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      # consumer record value가 String이므로 DLT 재발행 시 이중 인코딩 방지를 위해 StringSerializer 고정
      # (실제 직렬화 보장은 KafkaConsumerConfig producer factory 빈에서 코드로 강제 — 프로파일 무관)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all # DLT 재발행 신뢰성 — 리더+ISR 팔로워 확인 후 성공 처리

app:
  sse:
    heartbeat-interval-ms: ${SSE_HEARTBEAT_INTERVAL_MS:30000}
    timeout-ms: ${SSE_TIMEOUT_MS:1800000}