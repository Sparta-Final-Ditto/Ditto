server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ditto_chat
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
  data:
    mongodb:
      uri: mongodb://localhost:27017/ditto_chat
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
