# 앱 서버(ditto-app) 전용 스택. postgres/redis/mongodb/kafka는 ditto-db 인스턴스에서
# 별도로 구동되며(terraform/scripts/db_userdata.sh), 아래 서비스들은 DB_HOST/REDIS_HOST/
# MONGO_HOST/KAFKA_HOST 환경변수로 그 위치를 바라본다.
#   - 로컬 개발: .env 미설정 시 기본값(postgres/redis/mongodb/kafka)이 docker-compose.infra.yml의
#     서비스명과 일치하므로 `docker compose -f docker-compose.infra.yml up -d` 로 인프라를 먼저 띄운 뒤
#     `docker compose up -d` 실행
#   - 운영: ENV_PROD 시크릿에 DB_HOST/REDIS_HOST/MONGO_HOST/KAFKA_HOST=<ditto-db private ip> 설정
services:
  api-gateway:
    image: ${ECR_REGISTRY:-}ditto/api-gateway:${IMAGE_TAG:-latest}
    container_name: ditto-api-gateway
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8081
      FEED_SERVICE_URL: http://feed-service:8082
      MATCH_SERVICE_URL: http://match-service:8083
      CHAT_SERVICE_URL: http://chat-service:8084
      CHAT_WEBSOCKET_URL: ws://chat-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      ASSISTANT_SERVICE_URL: http://assistant-service:8086
    depends_on:
      - user-service
      - feed-service
      - match-service
      - chat-service
      - notification-service
      - assistant-service

  user-service:
    image: ${ECR_REGISTRY:-}ditto/user-service:${IMAGE_TAG:-latest}
    container_name: ditto-user-service
    ports:
      # 로컬 개발 편의용 포트 공개입니다.
      # 운영 환경에서는 user-service를 외부에 직접 노출하지 않고 gateway/internal network로만 접근해야 합니다.
      - "8081:8081"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/ditto_user
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      JWT_SECRET: ${JWT_SECRET}
      APP_KAKAO_API_KEY: ${APP_KAKAO_API_KEY}

  feed-service:
    image: ${ECR_REGISTRY:-}ditto/feed-service:${IMAGE_TAG:-latest}
    container_name: ditto-feed-service
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/ditto_feed
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:9092
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN}
      APP_KAKAO_API_KEY: ${APP_KAKAO_API_KEY}

  match-service:
    image: ${ECR_REGISTRY:-}ditto/match-service:${IMAGE_TAG:-latest}
    container_name: ditto-match-service
    ports:
      - "8083:8083"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/ditto_match
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:9092
      EMBEDDING_SERVICE_URL: http://embedding-service:8090
    depends_on:
      embedding-service:
        condition: service_started

  chat-service:
    image: ${ECR_REGISTRY:-}ditto/chat-service:${IMAGE_TAG:-latest}
    container_name: ditto-chat-service
    ports:
      - "8084:8084"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/ditto_chat
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGODB_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST:-mongodb}:27017/ditto_chat?authSource=admin
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:9092
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      - user-service

  notification-service:
    image: ${ECR_REGISTRY:-}ditto/notification-service:${IMAGE_TAG:-latest}
    container_name: ditto-notification-service
    ports:
      - "8085:8085"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/ditto_notification
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:9092

  embedding-service:
    image: ${ECR_REGISTRY:-}ditto/embedding-service:${IMAGE_TAG:-latest}
    container_name: ditto-embedding-service
    ports:
      - "8090:8090"
    restart: unless-stopped
    environment:
      DB_URL: postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST:-postgres}:5432/ditto_embedding
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:9092

  assistant-service:
    image: ${ECR_REGISTRY:-}ditto/assistant-service:${IMAGE_TAG:-latest}
    container_name: ditto-assistant-service
    ports:
      - "8086:8086"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:5432/ditto_assistant
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ASSISTANT_LLM_PROVIDER: ${ASSISTANT_LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ditto-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5; ollama pull embeddinggemma; wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q embeddinggemma"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  ollama_data: